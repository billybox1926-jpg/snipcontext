name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - feature-update

permissions:
  contents: write

jobs:
  # ── Lint & type-check ─────────────────────────────────────────────
  quality:
    name: Quality (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint & fix
        run: |
          ruff check --fix src/snipcontext tests
          ruff format src/snipcontext tests

      - name: Commit auto-fixes
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-fix ruff lint and format"
            git push
          fi

      - name: Mypy type check
        continue-on-error: true
        run: mypy src/snipcontext --ignore-missing-imports --no-site-packages

  # ── Tests across Python versions ─────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            hf-models-${{ runner.os }}-${{ matrix.python-version }}-
            hf-models-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Run tests
        shell: bash
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/src"
          python -m pytest -q --tb=short --cov=src/snipcontext --cov-report=term-missing

      - name: Run tests (slow)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/src"
          python -m pytest -q --tb=short -m "slow"

  # ── Minimal install (no optional extras) ────────────────────────
  test-minimal-no-web:
    name: Minimal (no web/semantic extras)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (no optional extras)
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify optional deps are unavailable
        run: |
          python -c "
          from snipcontext.web import WEB_AVAILABLE
          assert WEB_AVAILABLE == False, f'Expected WEB_AVAILABLE=False, got {WEB_AVAILABLE}'
          from snipcontext.core.search import SEMANTIC_AVAILABLE
          assert SEMANTIC_AVAILABLE == False, f'Expected SEMANTIC_AVAILABLE=False, got {SEMANTIC_AVAILABLE}'
          print('OK: both optional deps correctly unavailable')
          "

      - name: Run tests (web & semantic tests should be skipped)
        shell: bash
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/src"
          python -m pytest -q --tb=short -m "not slow"

  # ── Build & verify package ───────────────────────────────────────
  build:
    name: Build & verify
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package with twine
        run: twine check dist/*

      - name: Verify entry points
        run: |
          pip install dist/*.whl
          snipcontext --help
          sc --help

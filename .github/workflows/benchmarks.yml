name: Benchmarks

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    name: Benchmark index backends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-semantic-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            hf-semantic-${{ runner.os }}-${{ matrix.python-version }}-
            hf-semantic-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,semantic]"

      - name: Run slow benchmark tests
        shell: bash
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/src"
          python -m pytest -q --tb=short -m "slow"

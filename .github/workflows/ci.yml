name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature-update

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality.yml
    with:
      setup-node: false
      run-hygiene-check: false
      run-format-check: false
      run-lint: false
      run-test: true
      test-command: pytest
